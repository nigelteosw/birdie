services:
  birdie:
    build: .
    ports:
      - "6677:6677"
    environment:
      PORT: "6677"
      DB_PATH: /data/birdie.db
    volumes:
      - birdie-data:/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:6677/__birdie').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  birdie-data:
