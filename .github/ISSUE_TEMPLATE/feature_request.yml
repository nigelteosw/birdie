name: Feature request
description: Propose an improvement to Birdie.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched the existing issues and did not find this request.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or user need should Birdie address?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior or workflow you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or different approaches have you considered?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or implementation constraints if useful.
